name: simdjson
description: >-
  Fast JSON decoding for Dart using the simdjson C++ library over FFI.
  A drop-in alternative to jsonDecode for large documents.
version: 0.1.0
repository: https://github.com/Yusufihsangorgel/simdjson

topics:
  - json
  - performance
  - ffi
  - parser
  - simd

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
