name: simdjson_dart
description: >-
  Fast JSON for Dart using the simdjson C++ library over FFI. Lazy
  document access for large payloads plus jsonDecode-compatible decoding.
version: 0.2.5
repository: https://github.com/Yusufihsangorgel/simdjson_dart
issue_tracker: https://github.com/Yusufihsangorgel/simdjson_dart/issues

topics:
  - json
  - performance
  - ffi
  - parser
  - simd

screenshots:
  - description: >-
      Throughput against dart:convert: reading three values out of 6.7 MB of str
      ing-heavy JSON is 14.8x faster, decoding every field 1.19x to 1.75x.
    path: doc/bench.png

# hook/build.dart only ever runs CBuilder for the host toolchain; there is
# no android/ios support today (see README's "Platform support" section
# and .github/workflows/ci.yaml, which only runs ubuntu/macos/windows), so
# declare only the platforms this package actually builds on. Without
# this, pub.dev's static-analysis tagger infers android+ios support that
# does not exist. Update this list (and the README) together if a
# platform gains real support.
platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.10.0

dependencies:
  hooks: '>=2.0.2 <3.0.0'
  native_toolchain_c: '>=0.19.2 <0.20.0'

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
